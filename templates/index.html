<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doc-to-Dataset Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; color: #a78bfa; }
    header span { font-size: 13px; color: #64748b; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Ingest card ── */
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 15px; font-weight: 600; color: #a78bfa; margin-bottom: 16px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid #2d3148;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s;
    }
    .tab.active { background: #a78bfa22; border-color: #a78bfa; color: #a78bfa; }

    .input-panel { display: none; }
    .input-panel.active { display: block; }

    input[type="text"], textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #a78bfa; }
    textarea { resize: vertical; min-height: 100px; }

    .drop-zone {
      border: 2px dashed #2d3148;
      border-radius: 10px;
      padding: 36px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      color: #64748b;
      font-size: 14px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #a78bfa;
      background: #a78bfa0a;
      color: #a78bfa;
    }
    .drop-zone input { display: none; }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #a78bfa; color: #0f1117; }
    .btn-danger  { background: #ef4444; color: #fff; padding: 6px 14px; font-size: 12px; }
    .btn-export  { background: #1e293b; color: #a78bfa; border: 1px solid #a78bfa;
                   padding: 6px 12px; font-size: 12px; }

    .process-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }

    /* ── Status banner ── */
    .status {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .status.success { background: #14532d33; border: 1px solid #22c55e44; color: #86efac; display: block; }
    .status.error   { background: #7f1d1d33; border: 1px solid #ef444444; color: #fca5a5; display: block; }
    .status.loading { background: #1e293b;   border: 1px solid #2d3148;   color: #94a3b8; display: block; }

    /* ── Dataset table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; color: #64748b;
         border-bottom: 1px solid #2d3148; font-weight: 500; }
    td { padding: 12px 14px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    tr:hover td { background: #ffffff05; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-pdf   { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .badge-url   { background: #0369a122; color: #38bdf8; border: 1px solid #0369a144; }
    .badge-text  { background: #15803d22; color: #4ade80; border: 1px solid #15803d44; }
    .badge-image { background: #b4530922; color: #fb923c; border: 1px solid #b4530944; }

    .export-group { display: flex; gap: 6px; }

    #empty-state { text-align: center; padding: 40px; color: #475569; font-size: 14px; }

    /* ── Preview modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: #000000bb;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      width: 680px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
    }
    .modal h3 { font-size: 15px; color: #a78bfa; margin-bottom: 16px; }
    .chunk-item {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .chunk-label { font-size: 11px; color: #64748b; text-transform: uppercase;
                   letter-spacing: .05em; margin-bottom: 4px; }
    .chunk-text  { color: #cbd5e1; }
    .modal-close {
      margin-top: 16px;
      background: #2d3148;
      border: none;
      color: #94a3b8;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>Doc-to-Dataset Pipeline</h1>
  <span>Unstructured input → LLM-ready JSONL</span>
</header>

<div class="container">

  <!-- Ingest -->
  <div class="card">
    <h2>Ingest Document</h2>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('file')">File Upload</button>
      <button class="tab"        onclick="switchTab('url')">URL</button>
      <button class="tab"        onclick="switchTab('text')">Plain Text</button>
    </div>

    <!-- File -->
    <div id="panel-file" class="input-panel active">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.txt" onchange="handleFileSelect(this)"/>
        <div id="drop-label">Drop a PDF, image, or .txt here — or click to browse</div>
      </div>
    </div>

    <!-- URL -->
    <div id="panel-url" class="input-panel">
      <input type="text" id="url-input" placeholder="https://example.com/article"/>
    </div>

    <!-- Text -->
    <div id="panel-text" class="input-panel">
      <input type="text" id="text-name" placeholder="Document name (optional)" style="margin-bottom:10px"/>
      <textarea id="text-input" placeholder="Paste raw text here..."></textarea>
    </div>

    <div class="process-row">
      <button class="btn btn-primary" onclick="ingest()">Process →</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <!-- Datasets -->
  <div class="card">
    <h2>Processed Datasets</h2>
    <div id="dataset-container">
      <div id="empty-state">No datasets yet — ingest a document above</div>
    </div>
  </div>

</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Dataset Preview</h3>
    <div id="modal-chunks"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  let currentTab = 'file';
  let selectedFile = null;

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['file','url','text'][i] === tab);
    });
    document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── File drag/drop ────────────────────────────────────────────────────────
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  function handleFileSelect(input) {
    if (input.files[0]) setFile(input.files[0]);
  }

  function setFile(file) {
    selectedFile = file;
    document.getElementById('drop-label').textContent = '📄 ' + file.name;
  }

  // ── Ingest ────────────────────────────────────────────────────────────────
  async function ingest() {
    const status = document.getElementById('status');
    status.className = 'status loading';
    status.textContent = 'Processing…';

    try {
      let response;

      if (currentTab === 'file') {
        if (!selectedFile) { showStatus('error', 'Please select a file first.'); return; }
        const form = new FormData();
        form.append('file', selectedFile);
        response = await fetch('/api/ingest', { method: 'POST', body: form });

      } else if (currentTab === 'url') {
        const url = document.getElementById('url-input').value.trim();
        if (!url) { showStatus('error', 'Please enter a URL.'); return; }
        response = await fetch('/api/ingest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

      } else {
        const text = document.getElementById('text-input').value.trim();
        const name = document.getElementById('text-name').value.trim();
        if (!text) { showStatus('error', 'Please paste some text.'); return; }
        response = await fetch('/api/ingest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, name: name || 'pasted-text' })
        });
      }

      const data = await response.json();
      if (!response.ok) { showStatus('error', data.error); return; }

      showStatus('success', `✓ Created dataset "${data.name}" — ${data.total_chunks} chunks`);
      loadDatasets();

    } catch (err) {
      showStatus('error', 'Request failed: ' + err.message);
    }
  }

  function showStatus(type, msg) {
    const s = document.getElementById('status');
    s.className = 'status ' + type;
    s.textContent = msg;
  }

  // ── Load datasets ─────────────────────────────────────────────────────────
  async function loadDatasets() {
    const res  = await fetch('/api/datasets');
    const data = await res.json();
    const container = document.getElementById('dataset-container');

    if (!data.length) {
      container.innerHTML = '<div id="empty-state">No datasets yet — ingest a document above</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Source</th>
            <th>Chunks</th>
            <th>Created</th>
            <th>Export</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${data.map(d => `
            <tr>
              <td style="cursor:pointer;color:#a78bfa" onclick="preview(${d.id})">${d.name}</td>
              <td><span class="badge badge-${d.source === 'url' ? 'url' : d.source === 'text' ? 'text' : d.source.match(/png|jpg|jpeg/) ? 'image' : 'pdf'}">${d.source}</span></td>
              <td>${d.chunk_count}</td>
              <td style="color:#64748b;font-size:12px">${d.created}</td>
              <td>
                <div class="export-group">
                  <button class="btn btn-export" onclick="exportDataset(${d.id},'jsonl')">JSONL</button>
                  <button class="btn btn-export" onclick="exportDataset(${d.id},'csv')">CSV</button>
                  <button class="btn btn-export" onclick="exportDataset(${d.id},'json')">JSON</button>
                </div>
              </td>
              <td><button class="btn btn-danger" onclick="deleteDataset(${d.id})">Delete</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── Preview ───────────────────────────────────────────────────────────────
  async function preview(id) {
    const res  = await fetch(`/api/datasets/${id}`);
    const data = await res.json();
    document.getElementById('modal-title').textContent = data.name;
    document.getElementById('modal-chunks').innerHTML = data.chunks.slice(0, 5).map((c, i) => `
      <div class="chunk-item">
        <div class="chunk-label">Chunk ${i + 1}</div>
        <div class="chunk-label" style="margin-top:8px">Prompt</div>
        <div class="chunk-text">${c.prompt}</div>
        <div class="chunk-label" style="margin-top:10px">Completion</div>
        <div class="chunk-text">${c.completion}</div>
      </div>`).join('') + (data.chunks.length > 5 ? `<div style="color:#64748b;font-size:12px;text-align:center">+ ${data.chunks.length - 5} more chunks</div>` : '');
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── Export ────────────────────────────────────────────────────────────────
  function exportDataset(id, fmt) {
    window.location.href = `/api/export/${id}/${fmt}`;
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteDataset(id) {
    if (!confirm('Delete this dataset?')) return;
    await fetch(`/api/datasets/${id}`, { method: 'DELETE' });
    loadDatasets();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadDatasets();
</script>
</body>
</html>
